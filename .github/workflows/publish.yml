name: publish docker image

on: 
  push: 
    branches: 
      - main

permissions: 
  contents: read
  packages: write

env:
  IMAGE_NAME: gallery

jobs:
  publish:
    name: build and publish
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            MONGO_URI=${{ secrets.MONGO_URI }}
            GARAGE_ENDPOINT=${{ secrets.GARAGE_ENDPOINT }}
            GARAGE_ACCESS_KEY=${{ secrets.GARAGE_ACCESS_KEY }}
            GARAGE_SECRET_KEY=${{ secrets.GARAGE_SECRET_KEY }}
            GARAGE_BUCKET=${{ secrets.GARAGE_BUCKET }}
